# docker-compose.yml
# familyTraffic VPN — base service definition (version-controlled)
#
# Dynamic values come from /opt/familytraffic/.env:
#   GHCR_IMAGE   — e.g. ghcr.io/owner/familytraffic  (set during install)
#   FT_IMAGE_TAG — image tag: test | sha-abc1234 | latest (updated by CI/CD)
#   DOMAIN       — your domain name                   (set during install)
#
# This file is synced to /opt/familytraffic/docker-compose.yml by CI/CD (rsync).
# MTProxy (mtg v2) is integrated into the single familytraffic container via supervisord.
# Enable MTProxy: sudo familytraffic-mtproxy setup
#
# Usage:
#   cd /opt/familytraffic && docker compose pull && docker compose up -d

services:
  # ==========================================================================
  # familytraffic — single container (nginx + xray + certbot + supervisord)
  # v5.33: replaces multi-container architecture
  # network_mode: host — all processes share host network stack
  # ==========================================================================
  familytraffic:
    image: ${GHCR_IMAGE:-ghcr.io/OWNER/familytraffic}:${FT_IMAGE_TAG:-latest}
    container_name: familytraffic
    network_mode: host
    restart: unless-stopped
    volumes:
      # nginx config (generated by lib/nginx_stream_generator.sh)
      - /opt/familytraffic/config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # xray config — exact file path (do NOT mount the data/ directory)
      - /opt/familytraffic/config/xray_config.json:/etc/xray/config.json:ro
      # users db (live-reloadable via xray SIGHUP)
      - /opt/familytraffic/data/users.json:/etc/xray/users.json:ro
      # Let's Encrypt certificates (read-write: certbot renew writes new certs)
      - /etc/letsencrypt:/etc/letsencrypt
      # ACME webroot for certbot --webroot renewal
      - /var/www/html:/var/www/html
      # MTProxy config (mtg.toml + secrets.json) — read-only
      - /opt/familytraffic/config/mtproxy:/opt/familytraffic/config/mtproxy:ro
      # supervisord optional programs (mtg.conf created by mtproxy setup) — read-only
      - /opt/familytraffic/config/supervisord.d:/opt/familytraffic/config/supervisord.d:ro
      # xray logs — mounted to host so fail2ban can read /opt/familytraffic/logs/xray/
      - /opt/familytraffic/logs/xray:/var/log/xray
    env_file:
      - /opt/familytraffic/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # Check services by verifying TCP ports are accepting connections.
      # Port 8443: xray VLESS Reality; port 443: nginx stream.
      # Port-based check avoids supervisorctl socket and pgrep PID namespace issues.
      test: ["CMD", "sh", "-c",
        "nc -z -w 3 127.0.0.1 8443 && nc -z -w 3 127.0.0.1 443"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# MTProxy is integrated into familytraffic container via supervisord (mtg v2).
# Use: sudo familytraffic-mtproxy setup   — to enable MTProxy
# Use: sudo familytraffic-mtproxy disable — to disable MTProxy
